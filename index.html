.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:bold}
.stat-row{display:flex;gap:7px;margin-bottom:11px;overflow-x:auto;padding-bottom:2px}

@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

var recog=null;

function demarrerVoix(){
  if(!('webkitSpeechRecognition'in window)&&!('SpeechRecognition'in window)){
    alert("Utilise Chrome sur Android pour la reconnaissance vocale.");return;
  }
  // Ouvrir overlay
  document.getElementById("voice-overlay").classList.remove("hidden");
  document.getElementById("voice-onde").className="voice-onde anim";
  document.getElementById("voice-titre").textContent="Parlez maintenant…";
  document.getElementById("voice-retranscrit").textContent="";
  document.getElementById("voice-resultat").classList.add("hidden");
  document.getElementById("voice-msg").textContent="";
  document.getElementById("voice-actions").innerHTML="";
  document.getElementById("mic-btn").className="mic-btn ecoute";

  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  recog=new SR();
  recog.lang="fr-FR";recog.continuous=false;recog.interimResults=true;

  recog.onresult=function(e){
    var txt="",final=false;
    for(var i=e.resultIndex;i<e.results.length;i++){
      txt+=e.results[i][0].transcript;
      if(e.results[i].isFinal)final=true;
    }
    document.getElementById("voice-retranscrit").textContent='"'+txt+'"';
    if(final){
      recog.stop();
      envoyerAIA(txt);
    }
  };
  recog.onerror=function(e){
    document.getElementById("voice-titre").textContent="Erreur: "+e.error;
    document.getElementById("mic-btn").className="mic-btn";
    setTimeout(fermerVoix,2000);
  };
  recog.start();
}

function fermerVoix(){
  if(recog){try{recog.stop();}catch(e){}}
  recog=null;
  document.getElementById("voice-overlay").classList.add("hidden");
  document.getElementById("mic-btn").className="mic-btn";
}

  document.getElementById("voice-onde").className="voice-onde anim";

  document.getElementById("voice-titre").textContent="Parlez maintenant…";

  document.getElementById("voice-resultat").classList.add("hidden");

  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  recog=new SR();

  recog.onresult=function(e){
    var txt="",final=false;
    for(var i=e.resultIndex;i<e.results.length;i++){
      txt+=e.results[i][0].transcript;
      if(e.results[i].isFinal)final=true;
    }

// ── APPLIQUER UNE ACTION JSON ──────────────────────────────
function appliquerAction(action){
  switch(action.type){
    case "update_ruche":
      var r=APP.ruches.find(function(x){
        return x.numero&&x.numero.toUpperCase()===((action.numero||"").toUpperCase());
      });
      if(r){Object.assign(r,action.champs);return "Ruche "+r.numero+" mise à jour";}
      return "Ruche "+action.numero+" non trouvée";

    case "add_ruche":
      action.data.id=genId();
      APP.ruches.push(action.data);
      return "Ruche "+action.data.numero+" ajoutée";

    case "update_reine":
      var reine=APP.reines.find(function(x){
        return x.numero&&x.numero.toUpperCase()===((action.numero||"").toUpperCase());
      });
      if(reine){Object.assign(reine,action.champs);return "Reine "+reine.numero+" mise à jour";}
      return "Reine "+action.numero+" non trouvée";

    case "add_journal":
      action.data.id=genId();
      APP.journal.push(action.data);
      return "Note ajoutée : "+action.data.titre;

    case "add_stock_miel":
      action.data.id=genId();
      APP.stocks.push(action.data);
      return "Récolte "+action.data.poids+"kg ajoutée";

    case "add_vente":
      action.data.id=genId();
      APP.ventes.push(action.data);
      return "Vente "+action.data.montant+"€ enregistrée";

    case "update_stock_mat":
      var item=APP.stockMat.find(function(x){return x.label.toLowerCase().includes((action.label||"").toLowerCase());});
      if(item){item.qte=Math.max(0,(item.qte||0)+(action.delta||0));return item.label+" → "+item.qte;}
      return "Article non trouvé: "+action.label;

    case "navigate":
      APP.vue=action.vue||"accueil";
      return "Navigation → "+action.vue;

    default:
      return "Action inconnue: "+action.type;
  }
}

// VUE STOCK
// ════════════════════════════════════════════════════════
function vueStock(){
  var h='<div class="stitle">📦 Stock & Matériel</div>';
  var vides=ruchesVides();
  if(vides.length){
    h+='<div class="card" style="border-left-color:var(--orange);cursor:pointer" onclick="APP.vue=\'ruches\';APP.subvue=\'vides\';render()">';
    h+='<div style="font-size:12px;font-weight:bold;color:var(--brown);margin-bottom:6px">📦 Matériel enregistré</div>';
    ["Vide","Nucléus","Ruchette"].forEach(function(type){
      var nb=APP.ruches.filter(function(r){return r.typeRuche===type;}).length;
      if(nb)h+='<div style="display:flex;justify-content:space-between;font-size:11px;padding:3px 0"><span>'+type+'s</span><strong>'+nb+'</strong></div>';
    });
    h+='<div style="font-size:10px;color:var(--blue);margin-top:6px">Voir le détail →</div>';
    h+='</div>';
  }
  var cats={};
  APP.stockMat.forEach(function(s){cats[s.categorie]=(cats[s.categorie]||[]).concat([s]);});
  Object.keys(cats).forEach(function(cat){
    h+='<div style="font-size:11px;font-weight:bold;color:var(--brown);margin:10px 0 5px">'+cat+'</div>';
    cats[cat].forEach(function(item){
      h+='<div class="stock-item">';
      h+='<div><div style="font-size:12px;font-weight:bold;color:var(--dark)">'+item.label+'</div>';
      h+='<div style="font-size:10px;color:#888">'+item.unite+'</div></div>';
      h+='<div style="display:flex;align-items:center;gap:7px">';
      h+='<button class="qty-btn" onclick="modifStock('+item.id+',-1)">−</button>';
      h+='<span style="font-size:20px;font-weight:bold;min-width:30px;text-align:center;color:'+(item.qte>0?"var(--green)":"#ccc")+'">'+(item.qte||0)+'</span>';
      h+='<button class="qty-btn" onclick="modifStock('+item.id+',1)">+</button>';
      h+='</div></div>';
    });
  });
  h+='<button class="btn full" style="background:#eee;color:#333;margin-top:10px" onclick="formStockItem()">+ Article personnalisé</button>';
  return h;
}
function modifStock(id,d){var i=APP.stockMat.find(function(x){return x.id===id;});if(i){i.qte=Math.max(0,(i.qte||0)+d);sauverTout();render();}}
function formStockItem(){
  var h='<input class="inp" id="si-cat" placeholder="Catégorie"><input class="inp" id="si-label" placeholder="Libellé *"><input class="inp" id="si-qte" type="number" min="0" value="0"><input class="inp" id="si-unit" placeholder="Unité">';
  h+='<button class="btn full" style="background:var(--gold);color:var(--dark)" onclick="sauverStockItem()">✅ Ajouter</button>';
  ouvrirModal("📦 Nouveau stock",h);
}
function sauverStockItem(){
  var l=document.getElementById("si-label").value.trim();if(!l){alert("Libellé obligatoire");return;}
  APP.stockMat.push({id:genId(),categorie:document.getElementById("si-cat").value||"Autre",label:l,qte:parseInt(document.getElementById("si-qte").value)||0,unite:document.getElementById("si-unit").value||"unités"});
  sauverTout();fermerModal();render();
}

// ════════════════════════════════════════════════════════
// VUE CARTE
// ════════════════════════════════════════════════════════
function vueCarte(){
  var h='<div class="stitle">🗺️ Ruchers</div>';
  APP.ruchers.forEach(function(r){
    var nb=APP.ruches.filter(function(x){return x.rucher===r.nom;}).length;
    h+='<div class="card" style="border-left-color:'+r.couleur+'">';
    h+='<div style="display:flex;justify-content:space-between;margin-bottom:5px"><strong style="color:'+r.couleur+'">'+r.nom+'</strong><span style="font-size:10px;color:#888">'+nb+' ruche(s)</span></div>';
    h+='<div style="font-size:10px;color:#666;margin-bottom:5px">'+r.adresse+'</div>';
    if(r.tel) h+='<a href="tel:'+r.tel+'" style="font-size:10px;color:var(--blue);display:block;margin-bottom:5px">📞 '+r.tel+'</a>';
    h+='<iframe src="https://www.google.com/maps?q='+r.lat+','+r.lng+'&z=14&output=embed" width="100%" height="130" frameborder="0" style="border:none;border-radius:7px" loading="lazy"></iframe>';
    h+='<button class="btn" style="background:#eee;color:#333;font-size:10px;margin-top:7px" onclick="formRucher('+r.id+')">✏️ Modifier</button>';
    h+='</div>';
  });
  h+='<button class="btn full" style="background:var(--gold);color:var(--dark)" onclick="formRucher(null)">+ Nouveau rucher</button>';
  return h;
}
function formRucher(id){
  var r=id?APP.ruchers.find(function(x){return x.id===id;}):null;
  var h='<input class="inp" id="rc-nom" value="'+(r?r.nom:"")+'" placeholder="Nom *"><input class="inp" id="rc-adr" value="'+(r?r.adresse:"")+'" placeholder="Adresse"><input class="inp" id="rc-tel" value="'+(r?r.tel||"":"")+'" placeholder="Téléphone">';
  h+='<div class="grid2"><input class="inp" id="rc-lat" type="number" step="0.0001" value="'+(r?r.lat:44)+'"><input class="inp" id="rc-lng" type="number" step="0.0001" value="'+(r?r.lng:1.5)+'"></div>';
  h+='<button class="btn full" style="background:var(--gold);color:var(--dark)" onclick="sauverRucher('+(r?r.id:"null")+')">'+(r?"💾":"✅")+'</button>';
  ouvrirModal(r?"Modifier "+r.nom:"Nouveau rucher",h);
}
function sauverRucher(id){
  var nom=document.getElementById("rc-nom").value.trim();if(!nom){alert("Nom obligatoire");return;}
  var data={nom:nom,adresse:document.getElementById("rc-adr").value,tel:document.getElementById("rc-tel").value,lat:parseFloat(document.getElementById("rc-lat").value)||44,lng:parseFloat(document.getElementById("rc-lng").value)||1.5,couleur:"#E8A800"};
  if(id){Object.assign(APP.ruchers.find(function(x){return x.id===id;}),data);}else{data.id=genId();APP.ruchers.push(data);}
  sauverTout();fermerModal();render();
}

// VUE ALERTES
// ════════════════════════════════════════════════════════
function vueAlertes(){
  var urg=APP.ruches.filter(function(r){return jours(r.insp)>14||(r.mal&&r.mal!=="Aucune")||r.etat==="Faible";});
  var h='<div class="stitle">⚠️ Alertes ('+urg.length+')</div>';
  if(!urg.length) return h+'<div class="card" style="text-align:center;border-left-color:var(--green);padding:25px"><div style="font-size:28px">✅</div><div style="color:var(--green);font-weight:bold;margin-top:6px">Tout va bien !</div></div>';
  urg.forEach(function(r){
    var col=etatColor(r.etat||"Bon");
    h+='<div class="card" style="border-left-color:'+col+'">';
    h+='<div style="display:flex;justify-content:space-between"><strong>'+r.numero+'</strong>'+badge(r.etat||"Bon",col)+'</div>';
    h+='<div style="font-size:10px;color:#666;margin-top:5px">';
    if(jours(r.insp)>14) h+='<div>⏰ Non inspectée depuis <strong>'+jours(r.insp)+'j</strong></div>';
    if(r.mal&&r.mal!=="Aucune") h+='<div>🦠 '+r.mal+'</div>';
    if(r.etat==="Faible") h+='<div>📉 État critique</div>';
    h+='</div>';
    h+='<button class="btn" style="background:var(--gold);color:var(--dark);font-size:10px;margin-top:7px" onclick="inspRapide('+r.id+')">✓ Marquer inspectée</button>';
    h+='</div>';
  });
  return h;
}

// ════════════════════════════════════════════════════════
// VUE MIELLERIE
// ════════════════════════════════════════════════════════
function vueMiellerie(){
  var tot=APP.stocks.reduce(function(a,s){return a+(s.poids||0);},0);
  var h='<div class="stitle">🪣 Miellerie — '+tot+' kg stock</div>';
  h+='<button class="btn full" style="background:var(--gold);color:var(--dark)" onclick="formStock(null)">+ Nouvelle récolte</button>';
  APP.stocks.slice().reverse().forEach(function(s){
    h+='<div class="card" style="cursor:pointer" onclick="formStock('+s.id+')">';
    h+='<div style="display:flex;justify-content:space-between"><div><strong>'+s.type+'</strong> <span style="font-size:10px;color:#888">'+s.rucher+'</span></div><strong style="color:var(--gold)">'+s.poids+'kg</strong></div>';
    h+='<div style="font-size:9px;color:#aaa;margin-top:2px">'+fmt(s.date)+'</div>';
    h+='</div>';
  });
  return h;
}
function formStock(id){
  var s=id?APP.stocks.find(function(x){return x.id===id;}):null;
  var opts=APP.ruchers.map(function(r){return'<option '+(s&&s.rucher===r.nom?"selected":"")+'>'+r.nom+'</option>';}).join("");
  var h='<select class="inp" id="s-type">'+["Acacia","Colza","Printemps","Forêt","Châtaignier","Tilleul","Bruyère","Toutes fleurs"].map(function(t){return'<option '+(s&&s.type===t?"selected":"")+'>'+t+'</option>';}).join("")+'</select>';
  h+='<select class="inp" id="s-ruch"><option>— Rucher —</option>'+opts+'</select>';
  h+='<input class="inp" id="s-poids" type="number" min="0" step="0.5" value="'+(s?s.poids:"")+'" placeholder="Poids kg">';
  h+='<input class="inp" id="s-date" type="date" value="'+(s?s.date:today())+'">';
  h+='<textarea class="inp" id="s-notes" rows="2">'+(s?s.notes||"":"")+'</textarea>';
  h+='<button class="btn full" style="background:var(--gold);color:var(--dark)" onclick="sauverStock('+(s?s.id:"null")+')">'+(s?"💾":"✅ Ajouter")+'</button>';
  ouvrirModal("🪣 Récolte",h);
}
function sauverStock(id){
  var data={type:document.getElementById("s-type").value,rucher:document.getElementById("s-ruch").value,poids:parseFloat(document.getElementById("s-poids").value)||0,date:document.getElementById("s-date").value,notes:document.getElementById("s-notes").value.trim()};
  if(id){Object.assign(APP.stocks.find(function(x){return x.id===id;}),data);}else{data.id=genId();APP.stocks.push(data);}
  sauverTout();fermerModal();render();
}

// VUE REINES
// ════════════════════════════════════════════════════════
function vueReines(){
  var pondeuses=APP.reines.filter(function(r){return r.statut==="Pondeuse";}).length;
  var h='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">';
  h+='<div class="stitle" style="margin-bottom:0">👑 Reines ('+APP.reines.length+')</div>';
  h+='<button class="btn" style="background:#8b5cf6;color:white;font-size:11px" onclick="formReine(null)">+ Nouvelle</button>';
  h+='</div>';
  var statuts={};APP.reines.forEach(function(r){statuts[r.statut]=(statuts[r.statut]||0)+1;});
  h+='<div style="display:flex;gap:5px;overflow-x:auto;padding-bottom:4px;margin-bottom:10px">';
  ["Cellule royale","Vierge","Fécondée","Pondeuse","Remplacée","Morte"].forEach(function(s){
    if(statuts[s]) h+='<button class="btn" style="background:'+statutReineColor(s)+'22;color:'+statutReineColor(s)+';font-size:9px;padding:4px 9px;flex-shrink:0;border:1px solid '+statutReineColor(s)+'40" onclick="filtreReine(\''+s+'\')">'+s+' ('+statuts[s]+')</button>';
  });
  h+='</div>';
  var grefs={};APP.reines.forEach(function(r){grefs[r.greffage||r.elevage]=(grefs[r.greffage||r.elevage]||[]).concat([r]);});
  Object.keys(grefs).forEach(function(g){
    var list=grefs[g];
    h+='<div style="font-size:11px;font-weight:bold;color:#555;margin:8px 0 5px">🐝 '+g+' ('+list.length+')</div>';
    list.forEach(function(r){
      var col=statutReineColor(r.statut);
      h+='<div class="card" style="border-left-color:'+col+';padding:8px;cursor:pointer" onclick="detailReine('+r.id+')">';
      h+='<div style="display:flex;justify-content:space-between"><strong style="font-size:12px">'+r.numero+'</strong>'+badge(r.statut,col)+'</div>';
      h+='<div style="font-size:9px;color:#888;margin-top:3px">'+r.ruche+' · Greffe: '+fmt(r.dateGreffe)+'</div>';
      if(r.dateNee||r.dateFeco||r.datePonte){
        h+='<div style="font-size:9px;color:#aaa">'+(r.dateNee?"Née:"+fmt(r.dateNee):"")+' '+(r.dateFeco?"Féc:"+fmt(r.dateFeco):"")+' '+(r.datePonte?"Ponte:"+fmt(r.datePonte):"")+'</div>';
      }
      h+='</div>';
    });
  });
  return h;
}
function filtreReine(s){
  var list=APP.reines.filter(function(r){return r.statut===s;});
  var h='<button class="btn" style="background:#eee;color:#333;font-size:10px;margin-bottom:10px" onclick="render()">← Retour</button>';
  h+='<div class="stitle">'+s+' ('+list.length+')</div>';
  list.forEach(function(r){
    var col=statutReineColor(r.statut);
    h+='<div class="card" style="border-left-color:'+col+';padding:8px;cursor:pointer" onclick="detailReine('+r.id+')"><div style="display:flex;justify-content:space-between"><strong>'+r.numero+'</strong>'+badge(r.statut,col)+'</div><div style="font-size:9px;color:#888">'+r.elevage+' · '+r.ruche+'</div></div>';
  });
  document.getElementById("page").innerHTML=h;
}
function detailReine(id){
  var r=APP.reines.find(function(x){return x.id===id;});if(!r)return;
  var col=statutReineColor(r.statut);
  var h='<div class="info-r"><span class="info-k">Numéro</span><span class="info-v">'+r.numero+'</span></div>';
  h+='<div class="info-r"><span class="info-k">Greffage</span><span class="info-v">'+(r.greffage||r.elevage)+'</span></div>';
  h+='<div class="info-r"><span class="info-k">Statut</span><span class="info-v">'+badge(r.statut,col)+'</span></div>';
  h+='<div class="info-r"><span class="info-k">Ruche</span><span class="info-v">'+r.ruche+'</span></div>';
  h+='<div class="info-r"><span class="info-k">Mère</span><span class="info-v">'+(r.mere||"—")+'</span></div>';
  h+='<div class="info-r"><span class="info-k">Greffe</span><span class="info-v">'+fmt(r.dateGreffe)+'</span></div>';
  h+='<div class="info-r"><span class="info-k">Naissance</span><span class="info-v">'+fmt(r.dateNee)+'</span></div>';
  h+='<div class="info-r"><span class="info-k">Fécondation</span><span class="info-v">'+fmt(r.dateFeco)+'</span></div>';
  h+='<div class="info-r"><span class="info-k">Ponte</span><span class="info-v">'+fmt(r.datePonte)+'</span></div>';
  if(r.notes) h+='<div style="background:#fffde7;border-radius:8px;padding:8px;font-size:11px;margin:8px 0;font-style:italic">'+r.notes+'</div>';
  h+='<div style="margin:10px 0 6px;font-size:10px;color:#888">Changer statut :</div>';
  h+='<div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px">';
  STATUTS_REINE.forEach(function(s){
    h+='<button class="btn" style="font-size:9px;padding:4px 9px;background:'+(r.statut===s?statutReineColor(s):"#eee")+';color:'+(r.statut===s?"white":"#333")+'" onclick="changerStatutReine('+id+',\''+s+'\')">'+s+'</button>';
  });
  h+='</div>';
  h+='<div style="display:flex;gap:7px"><button class="btn" style="background:#8b5cf6;color:white;flex:2" onclick="formReine('+id+');fermerModal()">✏️ Modifier</button><button class="btn" style="background:var(--red);color:white" onclick="suppReine('+id+')">🗑️</button></div>';
  ouvrirModal("👑 "+r.numero,h);
}
function changerStatutReine(id,s){
  var r=APP.reines.find(function(x){return x.id===id;});if(!r)return;
  r.statut=s;
  if(s==="Vierge"&&!r.dateNee)r.dateNee=today();
  if(s==="Fécondée"&&!r.dateFeco)r.dateFeco=today();
  if(s==="Pondeuse"&&!r.datePonte)r.datePonte=today();
  sauverTout();fermerModal();render();
}
function formReine(id){
  var r=id?APP.reines.find(function(x){return x.id===id;}):null;
  var h='<div class="grid2"><input class="inp" id="q-num" value="'+(r?r.numero:"")+'" placeholder="Numéro *"><input class="inp" id="q-elev" value="'+(r?r.elevage:"")+'" placeholder="Élevage"></div>';
  h+='<div class="grid2"><input class="inp" id="q-ruche" value="'+(r?r.ruche:"")+'" placeholder="Ruche"><input class="inp" id="q-mere" value="'+(r?r.mere||"":"")+'" placeholder="Mère"></div>';
  h+='<select class="inp" id="q-statut">'+STATUTS_REINE.map(function(s){return'<option '+(r&&r.statut===s?"selected":"")+'>'+s+'</option>';}).join("")+'</select>';
  h+='<div class="grid2"><input class="inp" id="q-greffe" type="date" value="'+(r&&r.dateGreffe?r.dateGreffe:"")+'"><input class="inp" id="q-nee" type="date" value="'+(r&&r.dateNee?r.dateNee:"")+'"></div>';
  h+='<div class="grid2"><input class="inp" id="q-feco" type="date" value="'+(r&&r.dateFeco?r.dateFeco:"")+'"><input class="inp" id="q-ponte" type="date" value="'+(r&&r.datePonte?r.datePonte:"")+'"></div>';
  h+='<textarea class="inp" id="q-notes" rows="2">'+(r?r.notes||"":"")+'</textarea>';
  h+='<button class="btn full" style="background:#8b5cf6;color:white" onclick="sauverReine('+(r?r.id:"null")+')">'+(r?"💾":"✅ Ajouter")+'</button>';
  ouvrirModal(r?"Modifier "+r.numero:"Nouvelle reine",h);
}
function sauverReine(id){
  var num=document.getElementById("q-num").value.trim();if(!num){alert("Numéro obligatoire");return;}
  var data={numero:num,elevage:document.getElementById("q-elev").value,ruche:document.getElementById("q-ruche").value,statut:document.getElementById("q-statut").value,mere:document.getElementById("q-mere").value,dateGreffe:document.getElementById("q-greffe").value,dateNee:document.getElementById("q-nee").value,dateFeco:document.getElementById("q-feco").value,datePonte:document.getElementById("q-ponte").value,notes:document.getElementById("q-notes").value.trim(),ligne:"Buckfast"};
  if(id){Object.assign(APP.reines.find(function(x){return x.id===id;}),data);}else{data.id=genId();APP.reines.push(data);}
  sauverTout();fermerModal();render();
}
function suppReine(id){if(!confirm("Supprimer ?"))return;APP.reines=APP.reines.filter(function(x){return x.id!==id;});sauverTout();fermerModal();render();}

// VUE TRANSHUMANCE
// ════════════════════════════════════════════════════════
function vueTranshumance(){
  var h='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">';
  h+='<div class="stitle" style="margin-bottom:0">🚐 Transhumance</div>';
  h+='<button class="btn" style="background:var(--blue);color:white;font-size:11px" onclick="formTransh(null)">+ Zone</button>';
  h+='</div>';
  STATUTS_TRANSH.forEach(function(s){
    var zones=APP.transh.filter(function(t){return t.statut===s;});if(!zones.length)return;
    var col=statutTranshColor(s);
    h+='<div style="font-size:10px;font-weight:bold;color:'+col+';margin:9px 0 5px">'+s+' ('+zones.length+')</div>';
    zones.forEach(function(t){
      h+='<div class="card" style="border-left-color:'+col+';padding:9px;cursor:pointer" onclick="detailTransh('+t.id+')">';
      h+='<div style="display:flex;justify-content:space-between"><strong>'+t.nom+'</strong>'+badge(s,col)+'</div>';
      h+='<div style="font-size:9px;color:#888;margin-top:3px">'+t.commune+' · '+t.distance+'km · '+MOIS[t.mois_debut-1]+'→'+MOIS[t.mois_fin-1]+' · '+t.nb_ruches+' ruches</div>';
      h+='</div>';
    });
  });
  return h;
}
function detailTransh(id){
  var t=APP.transh.find(function(x){return x.id===id;});if(!t)return;
  var col=statutTranshColor(t.statut);
  var h='<div class="info-r"><span class="info-k">Zone</span><span class="info-v">'+t.nom+'</span></div>';
  h+='<div class="info-r"><span class="info-k">Statut</span><span class="info-v">'+badge(t.statut,col)+'</span></div>';
  h+='<div class="info-r"><span class="info-k">Distance</span><span class="info-v">'+t.distance+' km</span></div>';
  h+='<div class="info-r"><span class="info-k">Période</span><span class="info-v">'+MOIS[t.mois_debut-1]+' → '+MOIS[t.mois_fin-1]+'</span></div>';
  h+='<div class="info-r"><span class="info-k">Ruches</span><span class="info-v">'+t.nb_ruches+'</span></div>';
  if(t.tel) h+='<div class="info-r"><span class="info-k">Tel</span><a href="tel:'+t.tel+'" style="color:var(--blue);font-size:11px">'+t.tel+'</a></div>';
  if(t.notes) h+='<div style="background:#fffde7;border-radius:8px;padding:8px;font-size:11px;margin:8px 0;font-style:italic">'+t.notes+'</div>';
  h+='<div style="display:flex;flex-wrap:wrap;gap:5px;margin:10px 0">';
  STATUTS_TRANSH.forEach(function(s){h+='<button class="btn" style="font-size:9px;padding:4px 9px;background:'+(t.statut===s?col:"#eee")+';color:'+(t.statut===s?"white":"#333")+'" onclick="changerStatutTransh('+id+',\''+s+'\')">'+s+'</button>';});
  h+='</div>';
  h+='<iframe src="https://www.google.com/maps?q='+t.lat+','+t.lng+'&z=11&output=embed" width="100%" height="130" frameborder="0" style="border:none;border-radius:7px;margin-bottom:10px" loading="lazy"></iframe>';
  h+='<div style="display:flex;gap:7px"><button class="btn" style="background:var(--blue);color:white;flex:2" onclick="formTransh('+id+');fermerModal()">✏️</button><button class="btn" style="background:var(--red);color:white" onclick="suppTransh('+id+')">🗑️</button></div>';
  ouvrirModal("🚐 "+t.nom,h);
}
function changerStatutTransh(id,s){var t=APP.transh.find(function(x){return x.id===id;});if(t){t.statut=s;sauverTout();fermerModal();render();}}
function suppTransh(id){if(!confirm("Supprimer ?"))return;APP.transh=APP.transh.filter(function(x){return x.id!==id;});sauverTout();fermerModal();render();}
function formTransh(id){
  var t=id?APP.transh.find(function(x){return x.id===id;}):null;
  var h='<input class="inp" id="t-nom" value="'+(t?t.nom:"")+'" placeholder="Nom *"><input class="inp" id="t-com" value="'+(t?t.commune:"")+'" placeholder="Commune">';
  h+='<div class="grid2"><input class="inp" id="t-dist" type="number" value="'+(t?t.distance:50)+'"><input class="inp" id="t-ruches" type="number" value="'+(t?t.nb_ruches:10)+'"></div>';
  h+='<div class="grid2"><select class="inp" id="t-type">'+["ONF","Mairie","Privé","Agriculteur"].map(function(x){return'<option '+(t&&t.type===x?"selected":"")+'>'+x+'</option>';}).join("")+'</select>';
  h+='<select class="inp" id="t-stat">'+STATUTS_TRANSH.map(function(s){return'<option '+(t&&t.statut===s?"selected":"")+'>'+s+'</option>';}).join("")+'</select></div>';
  h+='<div class="grid2"><select class="inp" id="t-deb">'+MOIS.map(function(m,i){return'<option value="'+(i+1)+'" '+(t&&t.mois_debut===(i+1)?"selected":"")+'>'+m+'</option>';}).join("")+'</select>';
  h+='<select class="inp" id="t-fin">'+MOIS.map(function(m,i){return'<option value="'+(i+1)+'" '+(t&&t.mois_fin===(i+1)?"selected":"")+'>'+m+'</option>';}).join("")+'</select></div>';
  h+='<input class="inp" id="t-tel" value="'+(t?t.tel||"":"")+'" placeholder="Téléphone">';
  h+='<div class="grid2"><input class="inp" id="t-lat" type="number" step="0.001" value="'+(t?t.lat:44)+'"><input class="inp" id="t-lng" type="number" step="0.001" value="'+(t?t.lng:1.5)+'"></div>';
  h+='<textarea class="inp" id="t-notes" rows="2">'+(t?t.notes:"")+'</textarea>';
  h+='<button class="btn full" style="background:var(--blue);color:white" onclick="sauverTransh('+(t?t.id:"null")+')">'+(t?"💾":"✅ Ajouter")+'</button>';
  ouvrirModal(t?"Modifier "+t.nom:"Nouvelle zone",h);
}
function sauverTransh(id){
  var nom=document.getElementById("t-nom").value.trim();if(!nom){alert("Nom obligatoire");return;}
  var data={nom:nom,commune:document.getElementById("t-com").value,distance:parseInt(document.getElementById("t-dist").value)||50,nb_ruches:parseInt(document.getElementById("t-ruches").value)||10,type:document.getElementById("t-type").value,statut:document.getElementById("t-stat").value,mois_debut:parseInt(document.getElementById("t-deb").value),mois_fin:parseInt(document.getElementById("t-fin").value),tel:document.getElementById("t-tel").value,lat:parseFloat(document.getElementById("t-lat").value)||44,lng:parseFloat(document.getElementById("t-lng").value)||1.5,notes:document.getElementById("t-notes").value.trim(),miellees:[]};
  if(id){Object.assign(APP.transh.find(function(x){return x.id===id;}),data);}else{data.id=genId();APP.transh.push(data);}
  sauverTout();fermerModal();render();
}

// ════════════════════════════════════════════════════════
// VUE COMPTA
// ════════════════════════════════════════════════════════
function vueCompta(){
  var ca=APP.ventes.reduce(function(a,v){return a+(v.montant||0);},0);
  var dep=APP.depenses.reduce(function(a,d){return a+(d.montant||0);},0);
  var h='<div class="stitle">💰 Comptabilité</div>';
  h+='<div class="stat-row"><div class="stat-box"><div class="stat-nb" style="color:var(--green)">'+ca+'€</div><div class="stat-lb">Ventes</div></div>';
  h+='<div class="stat-box"><div class="stat-nb" style="color:var(--red)">'+dep+'€</div><div class="stat-lb">Dépenses</div></div>';
  h+='<div class="stat-box"><div class="stat-nb" style="color:'+(ca-dep>=0?"var(--green)":"var(--red)")+'">'+(ca-dep)+'€</div><div class="stat-lb">Bilan</div></div></div>';
  h+='<div style="display:flex;gap:8px;margin-bottom:12px"><button class="btn" style="background:var(--green);color:white;flex:1" onclick="formVente()">+ Vente</button><button class="btn" style="background:var(--red);color:white;flex:1" onclick="formDepense()">+ Dépense</button></div>';
  var ops=APP.ventes.map(function(v){return{date:v.date,lib:v.produit+(v.client?" — "+v.client:""),montant:"+"+v.montant+"€",col:"var(--green)"};})
    .concat(APP.depenses.map(function(d){return{date:d.date,lib:d.label,montant:"-"+d.montant+"€",col:"var(--red)"};}))
    .sort(function(a,b){return new Date(b.date)-new Date(a.date);}).slice(0,20);
  ops.forEach(function(o){h+='<div class="card" style="padding:8px;border-left-color:'+o.col+'"><div style="display:flex;justify-content:space-between"><span style="font-size:11px">'+o.lib+'</span><strong style="color:'+o.col+'">'+o.montant+'</strong></div><div style="font-size:9px;color:#aaa">'+fmt(o.date)+'</div></div>';});
  return h;
}
function formVente(){var h='<input class="inp" id="v-prod" placeholder="Produit"><input class="inp" id="v-client" placeholder="Client"><input class="inp" id="v-montant" type="number" placeholder="Montant €"><input class="inp" id="v-date" type="date" value="'+today()+'"><textarea class="inp" id="v-notes" rows="2"></textarea><button class="btn full" style="background:var(--green);color:white" onclick="sauverVente()">✅</button>';ouvrirModal("💰 Vente",h);}
function sauverVente(){APP.ventes.push({id:genId(),produit:document.getElementById("v-prod").value,client:document.getElementById("v-client").value,montant:parseFloat(document.getElementById("v-montant").value)||0,date:document.getElementById("v-date").value,notes:document.getElementById("v-notes").value});sauverTout();fermerModal();render();}
function formDepense(){var h='<input class="inp" id="d-lab" placeholder="Libellé *"><input class="inp" id="d-montant" type="number" placeholder="Montant €"><input class="inp" id="d-date" type="date" value="'+today()+'"><button class="btn full" style="background:var(--red);color:white" onclick="sauverDepense()">✅</button>';ouvrirModal("💸 Dépense",h);}
function sauverDepense(){APP.depenses.push({id:genId(),label:document.getElementById("d-lab").value,montant:parseFloat(document.getElementById("d-montant").value)||0,date:document.getElementById("d-date").value});sauverTout();fermerModal();render();}

// ════════════════════════════════════════════════════════
// VUE JOURNAL
// ════════════════════════════════════════════════════════
function vueJournal(){
  var h='<div class="stitle">📖 Journal</div><button class="btn full" style="background:var(--dark);color:var(--gold)" onclick="formJournal(null)">+ Note</button>';
  APP.journal.slice().reverse().forEach(function(j){
    h+='<div class="card" style="border-left-color:#888;cursor:pointer" onclick="formJournal('+j.id+')">';
    h+='<div style="display:flex;justify-content:space-between;margin-bottom:2px"><strong style="font-size:12px">'+j.titre+'</strong><span style="font-size:9px;color:#aaa">'+fmt(j.date)+'</span></div>';
    if(j.rucher) h+='<div style="font-size:9px;color:#aaa">📍 '+j.rucher+'</div>';
    h+='<div style="font-size:11px;color:#555;margin-top:3px">'+j.texte.substring(0,100)+(j.texte.length>100?"...":"")+'</div></div>';
  });
  return h;
}
function formJournal(id){
  var j=id?APP.journal.find(function(x){return x.id===id;}):null;
  var opts=APP.ruchers.map(function(r){return'<option '+(j&&j.rucher===r.nom?"selected":"")+'>'+r.nom+'</option>';}).join("");
  var h='<input class="inp" id="j-titre" value="'+(j?j.titre:"")+'" placeholder="Titre *"><select class="inp" id="j-ruch"><option value="">— Rucher —</option>'+opts+'</select><input class="inp" id="j-date" type="date" value="'+(j?j.date:today())+'"><textarea class="inp" id="j-texte" rows="5" placeholder="Observations…">'+(j?j.texte||"":"")+'</textarea>';
  h+='<div style="display:flex;gap:7px"><button class="btn" style="background:var(--dark);color:var(--gold);flex:2" onclick="sauverJournal('+(j?j.id:"null")+')">'+(j?"💾":"✅")+'</button>'+(j?'<button class="btn" style="background:var(--red);color:white" onclick="suppJournal('+j.id+')">🗑️</button>':'')+'</div>';
  ouvrirModal(j?"Modifier note":"📖 Nouvelle note",h);
}
function sauverJournal(id){
  var t=document.getElementById("j-titre").value.trim();if(!t){alert("Titre obligatoire");return;}
  var data={titre:t,rucher:document.getElementById("j-ruch").value,date:document.getElementById("j-date").value,texte:document.getElementById("j-texte").value.trim()};
  if(id){Object.assign(APP.journal.find(function(x){return x.id===id;}),data);}else{data.id=genId();APP.journal.push(data);}
  sauverTout();fermerModal();render();
}
function suppJournal(id){if(!confirm("Supprimer ?"))return;APP.journal=APP.journal.filter(function(x){return x.id!==id;});sauverTout();fermerModal();render();}

// ════════════════════════════════════════════════════════
// FAB & RENDER
// ════════════════════════════════════════════════════════
function fabAction(){
  var a={ruches:function(){formRuche(null);},stock:formStockItem,miel:function(){formStock(null);},reines:function(){formReine(null);},transh:function(){formTransh(null);},compta:formVente,journal:function(){formJournal(null);},carte:function(){formRucher(null);}};
  (a[APP.vue]||demarrerVoix)();
}

function render(){
  var vues={accueil:vueAccueil,ruches:vueRuches,stock:vueStock,carte:vueCarte,alertes:vueAlertes,miel:vueMiellerie,reines:vueReines,transh:vueTranshumance,compta:vueCompta,journal:vueJournal};
  document.getElementById("page").innerHTML=(vues[APP.vue]||vueAccueil)();
  var urg=APP.ruches.filter(function(r){return jours(r.insp)>14||(r.mal&&r.mal!=="Aucune")||r.etat==="Faible";}).length;
  var nav=[{id:"accueil",ic:"🏠",lb:"Accueil"},{id:"ruches",ic:"🐝",lb:"Ruches"},{id:"stock",ic:"📦",lb:"Stock"},{id:"miel",ic:"🪣",lb:"Miel"},{id:"reines",ic:"👑",lb:"Reines"},{id:"transh",ic:"🚐",lb:"Transh."},{id:"compta",ic:"💰",lb:"Compta"},{id:"alertes",ic:"⚠️",lb:urg>0?"("+urg+")":"Alertes"},{id:"journal",ic:"📖",lb:"Journal"}];
  document.getElementById("nav").innerHTML=nav.map(function(n){return'<button class="ntab'+(APP.vue===n.id?" on":"")+'" onclick="APP.vue=\''+n.id+'\';render()"><span class="nicon">'+n.ic+'</span>'+n.lb+'</button>';}).join("");
  var fabIcons={ruches:"🍯",stock:"📦",miel:"🪣",reines:"👑",transh:"🚐",compta:"💰",journal:"📝",carte:"📍"};
  document.getElementById("fab").textContent=fabIcons[APP.vue]||"🎙️";
}
render();
</script>
</body>
</html>
