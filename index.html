.voice-act{font-size:11px;color:#aaa;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.1)}
.voice-act:last-child{border-bottom:none}
.voice-act.ok{color:#4ade80}
.voice-stop{background:rgba(255,255,255,.15);border:none;border-radius:12px;padding:12px 30px;color:white;font-family:Georgia,serif;font-size:13px;cursor:pointer;margin-top:6px}
.toast{position:fixed;top:70px;left:50%;transform:translateX(-50%);background:var(--green);color:white;padding:8px 20px;border-radius:20px;font-size:11px;font-family:Georgia,serif;z-index:600;white-space:nowrap;animation:toastIn .3s ease}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.toast.err{background:var(--red)}
/* RUCHER ACTIF / INACTIF */
.rucher-actif{border-left:4px solid var(--gold)}

/* REINES CALCUL AUTO */
.date-calc{color:#9ca3af;font-style:italic;font-size:10px}
</style>
</head>

function rP(){return APP.ruches.filter(function(r){return !r.typeRuche||r.typeRuche==="Pleine";});}
function rV(){return APP.ruches.filter(function(r){return r.typeRuche==="Vide"||r.typeRuche==="Nucleus"||r.typeRuche==="Ruchette";});}

// Calcul dates reines depuis greffe
function calcDateReine(greffe,j){return greffe?addDays(greffe,j):null;}
function alertesReines(){
  var alerts=[];
  APP.reines.forEach(function(r){
    if(r.statut==="Morte"||r.statut==="Remplacee")return;
    var j=r.dateGreffe?jrs(r.dateGreffe):null;
    if(r.statut==="Cellule royale"&&j!==null&&j>JOURS_NAISSANCE+3){alerts.push({type:"red",msg:"Reine "+r.numero+" : naissance depassee (J+"+j+")"});}
    if(r.statut==="Vierge"&&j!==null&&j>JOURS_FECOND+3){alerts.push({type:"red",msg:"Reine "+r.numero+" : fecondation a verifier (J+"+j+")"});}
    if(r.statut==="Fecondee"&&j!==null&&j>JOURS_PONTE+3){alerts.push({type:"orange",msg:"Reine "+r.numero+" : ponte a verifier"});}
  });
  return alerts;
}
function alertesRuches(){
  var alerts=[];
  APP.ruches.forEach(function(r){
    var j=jrs(r.insp);
    if(j>21)alerts.push({type:"red",msg:"Ruche "+r.numero+" : non inspectee depuis "+j+"j"});
    else if(j>14)alerts.push({type:"orange",msg:"Ruche "+r.numero+" : non inspectee depuis "+j+"j"});
    if(r.mal&&r.mal!=="Aucune")alerts.push({type:"red",msg:"Ruche "+r.numero+" : "+r.mal});
    if(r.etat==="Faible")alerts.push({type:"red",msg:"Ruche "+r.numero+" : etat Faible"});
    if(r.prochaineVisite&&jrs(r.prochaineVisite)<0){alerts.push({type:"orange",msg:"Visite prevue "+r.numero+" : "+fmt(r.prochaineVisite)});}
  });
  return alerts;
}
// Hausses posées en temps réel
function haussesPositionnees(){return APP.ruches.reduce(function(t,r){return t+(r.hausses||0);},0);}
function stockHaussesLibres(){var tot=0;APP.stockMat.forEach(function(s){if(s.label==="Hausses")tot=s.qte;});return Math.max(0,tot-haussesPositionnees());}

var recog=null;
function demarrerVoix(){
  if(!("webkitSpeechRecognition"in window)&&!("SpeechRecognition"in window)){alert("Utilisez Chrome sur Android.");return;}
  document.getElementById("voice-overlay").classList.remove("hidden");
  document.getElementById("voice-onde").className="voice-onde anim";
  document.getElementById("voice-onde").innerHTML="&#127897;";
  document.getElementById("voice-titre").textContent="Parlez maintenant...";
  document.getElementById("voice-ret").textContent="";
  document.getElementById("voice-res").classList.add("hidden");
  document.getElementById("mic-btn").className="mic-btn ecoute";
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  recog=new SR();recog.lang="fr-FR";recog.continuous=false;recog.interimResults=true;
  recog.onresult=function(e){
    var txt="",final=false;
    for(var i=e.resultIndex;i<e.results.length;i++){txt+=e.results[i][0].transcript;if(e.results[i].isFinal)final=true;}
    document.getElementById("voice-ret").textContent='"'+txt+'"';
    if(final){recog.stop();envoyerIA(txt);}
  };
  recog.onerror=function(e){document.getElementById("voice-titre").textContent="Erreur: "+e.error;document.getElementById("mic-btn").className="mic-btn";setTimeout(fermerVoix,2000);};
  recog.start();
}
function fermerVoix(){if(recog){try{recog.stop();}catch(x){}}recog=null;document.getElementById("voice-overlay").classList.add("hidden");document.getElementById("mic-btn").className="mic-btn";}
function repondreVoix(){
  document.getElementById("voice-onde").className="voice-onde anim";
  document.getElementById("voice-onde").innerHTML="&#127897;";
  document.getElementById("voice-titre").textContent="Parlez maintenant...";
  document.getElementById("voice-ret").textContent="";
  document.getElementById("voice-res").classList.add("hidden");
  document.getElementById("mic-btn").className="mic-btn ecoute";
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  recog=new SR();recog.lang="fr-FR";recog.continuous=false;recog.interimResults=true;
  recog.onresult=function(e){
    var txt="",final=false;
    for(var i=e.resultIndex;i<e.results.length;i++){txt+=e.results[i][0].transcript;if(e.results[i].isFinal)final=true;}
    document.getElementById("voice-ret").textContent='"'+txt+'"';
    if(final){recog.stop();envoyerIA(txt);}
  };
  recog.onerror=function(){document.getElementById("voice-titre").textContent="Erreur";document.getElementById("mic-btn").className="mic-btn";};

}
async function envoyerIA(texte){
  document.getElementById("voice-onde").className="voice-onde ia anim";
  document.getElementById("voice-onde").innerHTML="&#129302;";
  document.getElementById("voice-titre").textContent="Claude analyse...";
  document.getElementById("mic-btn").className="mic-btn traite";
  function gNN(p){var n=APP.ruches.filter(function(r){return r.numero&&r.numero.toUpperCase().startsWith(p.toUpperCase());}).map(function(r){return parseInt((r.numero.match(/\d+$/)||["0"])[0]);}).filter(function(n){return !isNaN(n);});return n.length?Math.max.apply(null,n)+1:1;}
  var sys="Tu es l assistant apicole de J et J Les Ruchers de Seguela (Julien Mery et Jacques Didot, Generalieres 82230). Race Buckfast.\n\nRuchers: "+APP.ruchers.map(function(r){return r.nom;}).join(", ")+"\nRuches: "+APP.ruches.length+" ("+rP().length+" pleines, "+rV().length+" vides)\nReines: "+APP.reines.length+"\nDate: "+td()+"\nProchains numeros: JQ-"+pad(gNN("JQ-"))+", RV-"+pad(gNN("RV-"))+"\n\nRetourner UNIQUEMENT JSON valide:\n{\"message\":\"confirmation\",\"actions\":[]}\n\nACTIONS:\n1. update_ruche: {\"type\":\"update_ruche\",\"numero\":\"JQ-001\",\"champs\":{\"etat\":\"Excellent\",\"insp\":\""+td()+"\",\"pop\":4,\"mel\":3,\"mal\":\"Aucune\",\"reine\":\"\",\"notes\":\"\",\"typeRuche\":\"Pleine\",\"hausses\":2,\"prochaineVisite\":\"\",\"nourrissement\":\"\",\"traitement\":\"\"}}\n2. add_ruche (une): {\"type\":\"add_ruche\",\"data\":{\"numero\":\"JQ-001\",\"typeRuche\":\"Vide\",\"rucher\":\"\",\"etat\":\"Bon\",\"pop\":0,\"mel\":0,\"mal\":\"Aucune\",\"insp\":\"\",\"reine\":\"\",\"race\":\"Buckfast\",\"notes\":\"\",\"hausses\":0}}\n3. add_ruche (plusieurs): {\"type\":\"add_ruche\",\"batch\":[{\"numero\":\"RV-001\",\"typeRuche\":\"Vide\",\"rucher\":\"\",\"etat\":\"Bon\",\"pop\":0,\"mel\":0,\"mal\":\"Aucune\",\"insp\":\"\",\"reine\":\"\",\"race\":\"Buckfast\",\"notes\":\"\",\"hausses\":0}]}\n4. update_reine: {\"type\":\"update_reine\",\"numero\":\"R2026-D01\",\"champs\":{\"statut\":\"Vierge\",\"dateNee\":\""+td()+"\"}}\n5. add_journal add_stock_miel add_vente update_stock_mat navigate\n\nREGLES:\n- Ruche SANS reine = Vide. AVEC reine = Pleine.\n- Creation en masse: batch avec numeros consecutifs\n- Seule reponse valide: JSON";
  try{
    var resp=await fetch("/.netlify/functions/chat",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({system:sys,messages:[{role:"user",content:texte}]})});
    var data=await resp.json();
    var txt=data.content&&data.content[0]?data.content[0].text:"";
    var json;try{json=JSON.parse(txt.replace(/```json|```/g,"").trim());}catch(x){json={message:"Non parsable",actions:[]};}
    document.getElementById("voice-onde").className="voice-onde ia";
    document.getElementById("voice-onde").innerHTML="&#10003;";
    document.getElementById("voice-titre").textContent="Termine";
    document.getElementById("voice-msg").textContent=json.message||"";
    document.getElementById("voice-res").classList.remove("hidden");
    var ah="";
    if(json.actions&&json.actions.length){json.actions.forEach(function(a){var res=appAction(a);ah+="<div class='voice-act ok'>&#10003; "+res+"</div>";});sT();render();}
    else{ah="<div class='voice-act'>Aucune modification</div>";}
    document.getElementById("voice-acts").innerHTML=ah;
    document.getElementById("mic-btn").className="mic-btn";
  }catch(err){document.getElementById("voice-titre").textContent="Erreur connexion";document.getElementById("voice-msg").textContent=err.message;document.getElementById("voice-res").classList.remove("hidden");document.getElementById("mic-btn").className="mic-btn";}
}
function appAction(a){
  switch(a.type){
    case "update_ruche":
      var r=APP.ruches.find(function(x){return x.numero&&x.numero.toUpperCase()===(a.numero||"").toUpperCase();});
      if(r){Object.assign(r,a.champs);if(r.reine&&r.reine.trim()!=="")r.typeRuche="Pleine";if(a.champs.reine==="")r.typeRuche="Vide";return "Ruche "+r.numero+" OK";}return "Ruche "+a.numero+" non trouvee";
    case "add_ruche":
      if(a.batch&&a.batch.length){var n=0;a.batch.forEach(function(d){d.id=gId();if(d.reine&&d.reine.trim()!=="")d.typeRuche="Pleine";APP.ruches.push(d);n++;});return n+" ruche(s)";}
      a.data.id=gId();if(a.data.reine&&a.data.reine.trim()!=="")a.data.typeRuche="Pleine";APP.ruches.push(a.data);return "Ruche "+a.data.numero;
    case "update_reine":
      var rn=APP.reines.find(function(x){return x.numero&&x.numero.toUpperCase()===(a.numero||"").toUpperCase();});
      if(rn){Object.assign(rn,a.champs);return "Reine "+rn.numero;}return "Reine "+a.numero+" non trouvee";
    case "add_journal":a.data.id=gId();APP.journal.push(a.data);return "Note ajoutee";
    case "add_stock_miel":a.data.id=gId();APP.stocks.push(a.data);return "Recolte "+a.data.poids+"kg";
    case "add_vente":a.data.id=gId();APP.ventes.push(a.data);return "Vente "+a.data.montant+"EUR";
    case "update_stock_mat":var si=APP.stockMat.find(function(x){return x.label.toLowerCase().includes((a.label||"").toLowerCase());});if(si){si.qte=Math.max(0,(si.qte||0)+(a.delta||0));return si.label+"="+si.qte;}return "Article non trouve";
    case "navigate":APP.vue=a.vue||"accueil";return "-> "+a.vue;
    default:return "?"+a.type;
  }
}

function renderRuches(list){
  if(!list.length)return '<div class="card" style="text-align:center;color:#aaa;padding:20px">Aucune ruche<br><br><button class="btn" style="background:var(--gold);color:var(--dark)" onclick="formRuche(null)">+ Ajouter</button></div>';
  var h="";
  var al=alertesRuches();
  if(al.length)h+='<div class="albox">'+(al.length)+' alerte(s) ruches</div>';
  APP.ruchers.forEach(function(rucher){
    var du=list.filter(function(r){return r.rucher===rucher.nom;});
    if(!du.length)return;
    h+='<div style="font-size:11px;font-weight:bold;color:'+rucher.couleur+';margin:9px 0 5px">'+rucher.nom+' ('+du.length+')</div>';
    du.forEach(function(r){
      var col=eC(r.etat||"Bon"),j=jrs(r.insp);
      h+='<div class="card" style="border-left-color:'+col+';padding:9px;cursor:pointer" onclick="detailRuche('+r.id+')">';
      h+='<div style="display:flex;justify-content:space-between;align-items:center">';
      h+='<div><strong style="font-size:13px">'+r.numero+'</strong>';
      if(r.reine)h+=' <span style="font-size:9px;color:#888">'+r.reine+'</span>';
      if(r.hausses)h+=' <span style="font-size:9px;color:var(--blue)">'+r.hausses+' hauss.</span>';
      h+='</div>'+bdg(r.etat||"Bon",col)+'</div>';
      h+='<div style="display:flex;gap:10px;margin-top:4px">'+dots(r.pop||0,5,"#4A7C3F")+dots(r.mel||0,5,"#E8A800")+'</div>';
      if(r.mal&&r.mal!=="Aucune")h+='<div style="font-size:9px;color:var(--red);margin-top:3px">'+r.mal+'</div>';
      h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-top:4px">';
      h+='<span style="font-size:9px;color:'+(j>14?"var(--red)":"#aaa")+'">'+(r.insp?fmt(r.insp)+' ('+j+'j)':"Non inspectee")+'</span>';
      if(r.prochaineVisite)h+='<span style="font-size:9px;color:var(--blue)">Visite: '+fmt(r.prochaineVisite)+'</span>';

  var ops=APP.ventes.map(function(v){return{date:v.date,lib:v.produit+(v.client?" - "+v.client:""),val:"+"+v.montant+"E",col:"var(--green)"};}).concat(APP.depenses.map(function(d){return{date:d.date,lib:d.label,val:"-"+d.montant+"E",col:"var(--red)"};})). sort(function(a,b){return new Date(b.date)-new Date(a.date);}).slice(0,20);

  ops.forEach(function(o){h+='<div class="card" style="padding:8px;border-left-color:'+o.col+'"><div style="display:flex;justify-content:space-between"><span style="font-size:11px">'+o.lib+'</span><strong style="color:'+o.col+'">'+o.val+'</strong></div><div style="font-size:9px;color:#aaa">'+fmt(o.date)+'</div></div>';});
  return h;
}

function saveVente(){APP.ventes.push({id:gId(),produit:document.getElementById("v-p").value,client:document.getElementById("v-c").value,montant:parseFloat(document.getElementById("v-m").value)||0,date:document.getElementById("v-d").value,notes:document.getElementById("v-n").value});sT();fM();render();}
function formDepense(){var h='<input class="inp" id="d-l" placeholder="Libelle *"><input class="inp" id="d-m" type="number" placeholder="Montant EUR"><input class="inp" id="d-d" type="date" value="'+td()+'"><button class="btn full" style="background:var(--red);color:white" onclick="saveDepense()">Enregistrer</button>';oM("Depense",h);}

// ════ VUE JOURNAL ════
function vueJournal(){
  var h='<div class="stitle">Journal</div><button class="btn full" style="background:var(--dark);color:var(--gold)" onclick="formJournal(null)">+ Note</button>';
  if(!APP.journal.length)h+='<div class="card" style="text-align:center;color:#aaa">Aucune note</div>';
  APP.journal.slice().reverse().forEach(function(j){
    h+='<div class="card" style="border-left-color:#888;cursor:pointer" onclick="formJournal('+j.id+')">';
    h+='<div style="display:flex;justify-content:space-between;margin-bottom:2px"><strong style="font-size:12px">'+j.titre+'</strong><span style="font-size:9px;color:#aaa">'+fmt(j.date)+'</span></div>';
    if(j.rucher)h+='<div style="font-size:9px;color:#aaa">'+j.rucher+'</div>';
    h+='<div style="font-size:11px;color:#555;margin-top:3px">'+j.texte.substring(0,100)+'</div></div>';
  });
  return h;
}
function formJournal(id){
  var j=id?APP.journal.find(function(x){return x.id===id;}):null;
  var opts=APP.ruchers.map(function(r){return'<option '+(j&&j.rucher===r.nom?"selected":"")+'>'+r.nom+'</option>';}).join("");
  var h='<input class="inp" id="j-t" value="'+(j?j.titre:"")+'" placeholder="Titre *"><select class="inp" id="j-r"><option value="">-- Rucher --</option>'+opts+'</select><input class="inp" id="j-d" type="date" value="'+(j?j.date:td())+'"><textarea class="inp" id="j-tx" rows="5" placeholder="Observations...">'+(j?j.texte||"":"")+'</textarea>';
  h+='<div style="display:flex;gap:7px"><button class="btn" style="background:var(--dark);color:var(--gold);flex:2" onclick="saveJournal('+(j?j.id:"null")+')">'+(j?"Enregistrer":"Ajouter")+'</button>'+(j?'<button class="btn" style="background:var(--red);color:white" onclick="suppJournal('+j.id+')">X</button>':'')+'</div>';
  oM(j?"Modifier note":"Nouvelle note",h);
}
function saveJournal(id){var t=document.getElementById("j-t").value.trim();if(!t){alert("Titre obligatoire");return;}var d={titre:t,rucher:document.getElementById("j-r").value,date:document.getElementById("j-d").value,texte:document.getElementById("j-tx").value.trim()};if(id){Object.assign(APP.journal.find(function(x){return x.id===id;}),d);}else{d.id=gId();APP.journal.push(d);}sT();fM();render();}
function suppJournal(id){if(!confirm("Supprimer?"))return;APP.journal=APP.journal.filter(function(x){return x.id!==id;});sT();fM();render();}

function imprimerQRRuches(){
  var list=APP.subvue==="pleines"?rP():rV();

  html+='<div class="title">J&J Les Ruchers de Seguela - Etiquettes Ruches - <button onclick="window.print()" style="background:#E8A800;color:#1C1208;border:none;padding:2px 8px;border-radius:4px;cursor:pointer">Imprimer</button></div><div class="grid">';
  list.forEach(function(r){
    var qd="JJ:"+r.numero+(r.rucher?"|"+r.rucher:"")+(r.reine?"|R:"+r.reine:"");
    var qu="https://api.qrserver.com/v1/create-qr-code/?size=80x80&data="+encodeURIComponent(qd);
    html+='<div class="etiq"><div class="num">'+r.numero+'</div><div class="info">'+(r.rucher||"")+(r.typeRuche?" - "+r.typeRuche:"")+'</div><img src="'+qu+'" width="80" height="80" style="display:block;margin:0 auto;border:1px solid #e0d5c0;border-radius:4px"><div class="footer">J&J Les Ruchers de Seguela<br>'+(r.reine?"Reine: "+r.reine:"Sans reine")+'</div></div>';
  });
  html+='</div></body></html>';
  var w=window.open("","_blank");w.document.write(html);w.document.close();
}

  html+='<div class="title">J&J - Elevage Reines 2026 - '+list.length+' etiquettes - <button onclick="window.print()" style="background:#8b5cf6;color:white;border:none;padding:2px 8px;border-radius:4px;cursor:pointer">Imprimer</button></div><div class="grid">';
  list.forEach(function(r){

    var nC=calcDateReine(r.dateGreffe,JOURS_NAISSANCE),fC=calcDateReine(r.dateGreffe,JOURS_FECOND),pC=calcDateReine(r.dateGreffe,JOURS_PONTE);

  });
  html+='</div></body></html>';
  var w=window.open("","_blank");w.document.write(html);w.document.close();
}
