var recog=null;
function demarrerVoix(){
  if(!("webkitSpeechRecognition"in window)&&!("SpeechRecognition"in window)){alert("Utilisez Chrome sur Android.");return;}
  document.getElementById("voice-overlay").classList.remove("hidden");
  document.getElementById("voice-onde").className="voice-onde anim";
  document.getElementById("voice-onde").textContent="\uD83C\uDF99\uFE0F";
  document.getElementById("voice-titre").textContent="Parlez maintenant...";
  document.getElementById("voice-retranscrit").textContent="";
  document.getElementById("voice-resultat").classList.add("hidden");
  document.getElementById("mic-btn").className="mic-btn ecoute";
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  recog=new SR();recog.lang="fr-FR";recog.continuous=false;recog.interimResults=true;
  recog.onresult=function(e){
    var txt="",final=false;
    for(var i=e.resultIndex;i<e.results.length;i++){txt+=e.results[i][0].transcript;if(e.results[i].isFinal)final=true;}
    document.getElementById("voice-retranscrit").textContent='"'+txt+'"';
    if(final){recog.stop();envoyerIA(txt);}
  };
  recog.onerror=function(e){document.getElementById("voice-titre").textContent="Erreur: "+e.error;document.getElementById("mic-btn").className="mic-btn";setTimeout(fermerVoix,2000);};
  recog.start();
}
function fermerVoix(){if(recog){try{recog.stop();}catch(x){}}recog=null;document.getElementById("voice-overlay").classList.add("hidden");document.getElementById("mic-btn").className="mic-btn";}

  document.getElementById("voice-resultat").classList.add("hidden");
  document.getElementById("mic-btn").className="mic-btn ecoute";
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  recog=new SR();recog.lang="fr-FR";recog.continuous=false;recog.interimResults=true;
  recog.onresult=function(e){
    var txt="",final=false;
    for(var i=e.resultIndex;i<e.results.length;i++){txt+=e.results[i][0].transcript;if(e.results[i].isFinal)final=true;}
    document.getElementById("voice-retranscrit").textContent='"'+txt+'"';

  };
  recog.onerror=function(e){document.getElementById("voice-titre").textContent="Erreur";document.getElementById("mic-btn").className="mic-btn";};
  recog.start();
}

ta\":5}\n9. navigate: {\"type\":\"navigate\",\"vue\":\"ruches\"}\n\nREGLES:\n- Ruche SANS reine = typeRuche Vide. Ruche AVEC reine = typeRuche Pleine.\n- Creation en masse: generer batch avec numeros consecutifs depuis prochain numero dispo\n- inspecte/visite = date aujourd hui\n- reine pond = statut Pondeuse + datePonte aujourd hui\n- nee/eclos = statut Vierge + dateNee aujourd hui\n- TOUJOURS JSON valide uniquement";

function appliquerAction(a){
  switch(a.type){
    case "update_ruche":
      var r=APP.ruches.find(function(x){return x.numero&&x.numero.toUpperCase()===(a.numero||"").toUpperCase();});
      if(r){Object.assign(r,a.champs);if(r.reine&&r.reine.trim()!=="")r.typeRuche="Pleine";if(a.champs.reine==="")r.typeRuche="Vide";return "Ruche "+r.numero+" mise a jour";}
      return "Ruche "+a.numero+" non trouvee";
    case "add_ruche":
      if(a.batch&&a.batch.length){var n=0;a.batch.forEach(function(d){d.id=gId();if(d.reine&&d.reine.trim()!=="")d.typeRuche="Pleine";APP.ruches.push(d);n++;});return n+" ruche(s) ajoutee(s)";}
      a.data.id=gId();if(a.data.reine&&a.data.reine.trim()!=="")a.data.typeRuche="Pleine";APP.ruches.push(a.data);return "Ruche "+a.data.numero+" ajoutee";
    case "update_reine":
      var rn=APP.reines.find(function(x){return x.numero&&x.numero.toUpperCase()===(a.numero||"").toUpperCase();});
      if(rn){Object.assign(rn,a.champs);return "Reine "+rn.numero+" mise a jour";}return "Reine "+a.numero+" non trouvee";
    case "add_journal":
      a.data.id=gId();APP.journal.push(a.data);return "Note ajoutee";
    case "add_stock_miel":
      a.data.id=gId();APP.stocks.push(a.data);return "Recolte "+a.data.poids+"kg ajoutee";
    case "add_vente":
      a.data.id=gId();APP.ventes.push(a.data);return "Vente "+a.data.montant+" EUR";
    case "update_stock_mat":
      var si=APP.stockMat.find(function(x){return x.label.toLowerCase().includes((a.label||"").toLowerCase());});
      if(si){si.qte=Math.max(0,(si.qte||0)+(a.delta||0));return si.label+" = "+si.qte;}return "Article non trouve";
    case "navigate":
      APP.vue=a.vue||"accueil";return "Navigation vers "+a.vue;
    default: return "Action inconnue";
  }
}

  var num=document.getElementById("q-num").value.trim();if(!num){alert("Numero obligatoire");return;}
  var data={numero:num,greffage:document.getElementById("q-gref").value,elevage:document.getElementById("q-elev").value,ruche:document.getElementById("q-ruche").value,statut:document.getElementById("q-statut").value,mere:document.getElementById("q-mere").value,dateGreffe:document.getElementById("q-greffe").value,dateNee:document.getElementById("q-nee").value,dateIntroduction:document.getElementById("q-intro").value,dateFeco:document.getElementById("q-feco").value,datePonte:document.getElementById("q-ponte").value,notes:document.getElementById("q-notes").value.trim(),ligne:"Buckfast",productivite:parseInt(document.getElementById("q-prod").value)||null};
  if(id){Object.assign(APP.reines.find(function(x){return x.id===id;}),data);}else{data.id=gId();APP.reines.push(data);}
  sT();fM();render();
}
function suppReine(id){if(!confirm("Supprimer?"))return;APP.reines=APP.reines.filter(function(x){return x.id!==id;});APP.reineSelected=null;sT();fM();render();}
// ── VUE TRANSHUMANCE ──────────────────────────────────────────────
function vueTranshumance(){
  var h='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><div class="stitle" style="margin-bottom:0">Transhumance</div><button class="btn" style="background:var(--blue);color:white;font-size:11px" onclick="formTransh(null)">+ Zone</button></div>';
  STATUTS_TRANSH.forEach(function(s){
    var zones=APP.transh.filter(function(t){return t.statut===s;});if(!zones.length)return;
    var col=stC(s);
    h+='<div style="font-size:10px;font-weight:bold;color:'+col+';margin:9px 0 5px">'+s+' ('+zones.length+')</div>';
    zones.forEach(function(t){h+='<div class="card" style="border-left-color:'+col+';padding:9px;cursor:pointer" onclick="detailTransh('+t.id+')"><div style="display:flex;justify-content:space-between"><strong>'+t.nom+'</strong>'+bdg(s,col)+'</div><div style="font-size:9px;color:#888;margin-top:3px">'+t.commune+' - '+t.distance+'km - '+MOIS[t.mois_debut-1]+'->'+MOIS[t.mois_fin-1]+' - '+t.nb_ruches+' ruches</div></div>';});
  });
  if(!APP.transh.length)h+='<div class="card" style="text-align:center;color:#aaa;padding:20px">Aucune zone</div>';
  return h;
}
function detailTransh(id){
  var t=APP.transh.find(function(x){return x.id===id;});if(!t)return;
  var col=stC(t.statut);
  var h='<div class="info-r"><span class="info-k">Zone</span><span class="info-v">'+t.nom+'</span></div>';
  h+='<div class="info-r"><span class="info-k">Statut</span><span class="info-v">'+bdg(t.statut,col)+'</span></div>';
  h+='<div class="info-r"><span class="info-k">Distance</span><span class="info-v">'+t.distance+' km</span></div>';
  h+='<div class="info-r"><span class="info-k">Periode</span><span class="info-v">'+MOIS[t.mois_debut-1]+' -> '+MOIS[t.mois_fin-1]+'</span></div>';
  h+='<div class="info-r"><span class="info-k">Ruches</span><span class="info-v">'+t.nb_ruches+'</span></div>';
  if(t.tel)h+='<div class="info-r"><span class="info-k">Tel</span><a href="tel:'+t.tel+'" style="color:var(--blue);font-size:11px">'+t.tel+'</a></div>';
  if(t.notes)h+='<div style="background:#fffde7;border-radius:8px;padding:8px;font-size:11px;margin:8px 0;font-style:italic">'+t.notes+'</div>';
  h+='<div style="margin:10px 0 6px;font-size:10px;color:#888">Changer statut:</div><div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px">';
  STATUTS_TRANSH.forEach(function(s){h+='<button class="btn" style="font-size:9px;padding:4px 9px;background:'+(t.statut===s?stC(s):"#eee")+';color:'+(t.statut===s?"white":"#333")+'" onclick="changerST('+id+',\''+s+'\')">'+s+'</button>';});
  h+='</div><iframe src="https://www.google.com/maps?q='+t.lat+','+t.lng+'&z=11&output=embed" width="100%" height="130" frameborder="0" style="border:none;border-radius:7px;margin-bottom:10px" loading="lazy"></iframe>';
  h+='<div style="display:flex;gap:7px"><button class="btn" style="background:var(--blue);color:white;flex:2" onclick="formTransh('+id+');fM()">Modifier</button><button class="btn" style="background:var(--red);color:white" onclick="suppTransh('+id+')">X</button></div>';
  oM("Transhumance: "+t.nom,h);
}
function changerST(id,s){var t=APP.transh.find(function(x){return x.id===id;});if(t){t.statut=s;sT();fM();render();}}
function suppTransh(id){if(!confirm("Supprimer?"))return;APP.transh=APP.transh.filter(function(x){return x.id!==id;});sT();fM();render();}
function formTransh(id){
  var t=id?APP.transh.find(function(x){return x.id===id;}):null;
  var h='<input class="inp" id="t-nom" value="'+(t?t.nom:"")+'" placeholder="Nom *"><input class="inp" id="t-com" value="'+(t?t.commune:"")+'" placeholder="Commune"><div class="grid2"><input class="inp" id="t-dist" type="number" value="'+(t?t.distance:50)+'"><input class="inp" id="t-ruch" type="number" value="'+(t?t.nb_ruches:10)+'"></div>';
  h+='<div class="grid2"><select class="inp" id="t-type">'+["ONF","Mairie","Prive","Agriculteur"].map(function(x){return'<option '+(t&&t.type===x?"selected":"")+'>'+x+'</option>';}).join("")+'</select><select class="inp" id="t-stat">'+STATUTS_TRANSH.map(function(s){return'<option '+(t&&t.statut===s?"selected":"")+'>'+s+'</option>';}).join("")+'</select></div>';
  h+='<div class="grid2"><select class="inp" id="t-deb">'+MOIS.map(function(m,i){return'<option value="'+(i+1)+'" '+(t&&t.mois_debut===(i+1)?"selected":"")+'>'+m+'</option>';}).join("")+'</select><select class="inp" id="t-fin">'+MOIS.map(function(m,i){return'<option value="'+(i+1)+'" '+(t&&t.mois_fin===(i+1)?"selected":"")+'>'+m+'</option>';}).join("")+'</select></div>';
  h+='<input class="inp" id="t-tel" value="'+(t?t.tel||"":"")+'" placeholder="Tel"><div class="grid2"><input class="inp" id="t-lat" type="number" step="0.001" value="'+(t?t.lat:44)+'"><input class="inp" id="t-lng" type="number" step="0.001" value="'+(t?t.lng:1.5)+'"></div><textarea class="inp" id="t-notes" rows="2">'+(t?t.notes:"")+'</textarea>';
  h+='<button class="btn full" style="background:var(--blue);color:white" onclick="saveTransh('+(t?t.id:"null")+')">'+(t?"Enregistrer":"Ajouter")+'</button>';
  oM(t?"Modifier "+t.nom:"Nouvelle zone",h);
}
function saveTransh(id){var nom=document.getElementById("t-nom").value.trim();if(!nom){alert("Nom obligatoire");return;}var data={nom:nom,commune:document.getElementById("t-com").value,distance:parseInt(document.getElementById("t-dist").value)||50,nb_ruches:parseInt(document.getElementById("t-ruch").value)||10,type:document.getElementById("t-type").value,statut:document.getElementById("t-stat").value,mois_debut:parseInt(document.getElementById("t-deb").value),mois_fin:parseInt(document.getElementById("t-fin").value),tel:document.getElementById("t-tel").value,lat:parseFloat(document.getElementById("t-lat").value)||44,lng:parseFloat(document.getElementById("t-lng").value)||1.5,notes:document.getElementById("t-notes").value.trim()};if(id){Object.assign(APP.transh.find(function(x){return x.id===id;}),data);}else{data.id=gId();APP.transh.push(data);}sT();fM();render();}
// ── VUE COMPTA ──────────────────────────────────────────────
function vueCompta(){
  var ca=APP.ventes.reduce(function(a,v){return a+(v.montant||0);},0);
  var dep=APP.depenses.reduce(function(a,d){return a+(d.montant||0);},0);
  var h='<div class="stitle">Comptabilite</div><div class="stat-row"><div class="stat-box"><div class="stat-nb" style="color:var(--green)">'+ca+'EUR</div><div class="stat-lb">Ventes</div></div><div class="stat-box"><div class="stat-nb" style="color:var(--red)">'+dep+'EUR</div><div class="stat-lb">Depenses</div></div><div class="stat-box"><div class="stat-nb" style="color:'+(ca-dep>=0?"var(--green)":"var(--red)")+'">'+(ca-dep)+'EUR</div><div class="stat-lb">Bilan</div></div></div>';
  h+='<div style="display:flex;gap:8px;margin-bottom:12px"><button class="btn" style="background:var(--green);color:white;flex:1" onclick="formVente()">+ Vente</button><button class="btn" style="background:var(--red);color:white;flex:1" onclick="formDepense()">+ Depense</button></div>';
  var ops=APP.ventes.map(function(v){return{date:v.date,lib:v.produit+(v.client?" - "+v.client:""),montant:"+"+v.montant+"EUR",col:"var(--green)"};}).concat(APP.depenses.map(function(d){return{date:d.date,lib:d.label,montant:"-"+d.montant+"EUR",col:"var(--red)"};})). sort(function(a,b){return new Date(b.date)-new Date(a.date);}).slice(0,20);
  if(!ops.length)h+='<div class="card" style="text-align:center;color:#aaa">Aucune operation</div>';
  ops.forEach(function(o){h+='<div class="card" style="padding:8px;border-left-color:'+o.col+'"><div style="display:flex;justify-content:space-between"><span style="font-size:11px">'+o.lib+'</span><strong style="color:'+o.col+'">'+o.montant+'</strong></div><div style="font-size:9px;color:#aaa">'+fmt(o.date)+'</div></div>';});
  return h;
}
function formVente(){var h='<input class="inp" id="v-prod" placeholder="Produit"><input class="inp" id="v-client" placeholder="Client"><input class="inp" id="v-montant" type="number" placeholder="Montant EUR"><input class="inp" id="v-date" type="date" value="'+td()+'"><textarea class="inp" id="v-notes" rows="2"></textarea><button class="btn full" style="background:var(--green);color:white" onclick="saveVente()">Enregistrer</button>';oM("Vente",h);}
function saveVente(){APP.ventes.push({id:gId(),produit:document.getElementById("v-prod").value,client:document.getElementById("v-client").value,montant:parseFloat(document.getElementById("v-montant").value)||0,date:document.getElementById("v-date").value,notes:document.getElementById("v-notes").value});sT();fM();render();}
function formDepense(){var h='<input class="inp" id="d-lab" placeholder="Libelle *"><input class="inp" id="d-montant" type="number" placeholder="Montant EUR"><input class="inp" id="d-date" type="date" value="'+td()+'"><button class="btn full" style="background:var(--red);color:white" onclick="saveDepense()">Enregistrer</button>';oM("Depense",h);}
function saveDepense(){APP.depenses.push({id:gId(),label:document.getElementById("d-lab").value,montant:parseFloat(document.getElementById("d-montant").value)||0,date:document.getElementById("d-date").value});sT();fM();render();}
// ── VUE JOURNAL ──────────────────────────────────────────────
function vueJournal(){
  var h='<div class="stitle">Journal</div><button class="btn full" style="background:var(--dark);color:var(--gold)" onclick="formJournal(null)">+ Note</button>';
  if(!APP.journal.length)h+='<div class="card" style="text-align:center;color:#aaa">Aucune note</div>';
  APP.journal.slice().reverse().forEach(function(j){h+='<div class="card" style="border-left-color:#888;cursor:pointer" onclick="formJournal('+j.id+')"><div style="display:flex;justify-content:space-between;margin-bottom:2px"><strong style="font-size:12px">'+j.titre+'</strong><span style="font-size:9px;color:#aaa">'+fmt(j.date)+'</span></div>'+(j.rucher?'<div style="font-size:9px;color:#aaa">'+j.rucher+'</div>':'')+'<div style="font-size:11px;color:#555;margin-top:3px">'+j.texte.substring(0,100)+'</div></div>';});
  return h;
}
function formJournal(id){
  var j=id?APP.journal.find(function(x){return x.id===id;}):null;
  var opts=APP.ruchers.map(function(r){return'<option '+(j&&j.rucher===r.nom?"selected":"")+'>'+r.nom+'</option>';}).join("");
  var h='<input class="inp" id="j-titre" value="'+(j?j.titre:"")+'" placeholder="Titre *"><select class="inp" id="j-ruch"><option value="">-- Rucher --</option>'+opts+'</select><input class="inp" id="j-date" type="date" value="'+(j?j.date:td())+'"><textarea class="inp" id="j-texte" rows="5" placeholder="Observations...">'+(j?j.texte||"":"")+'</textarea>';
  h+='<div style="display:flex;gap:7px"><button class="btn" style="background:var(--dark);color:var(--gold);flex:2" onclick="saveJournal('+(j?j.id:"null")+')">'+(j?"Enregistrer":"Ajouter")+'</button>'+(j?'<button class="btn" style="background:var(--red);color:white" onclick="suppJournal('+j.id+')">X</button>':'')+'</div>';
  oM(j?"Modifier note":"Nouvelle note",h);
}
function saveJournal(id){var t=document.getElementById("j-titre").value.trim();if(!t){alert("Titre obligatoire");return;}var data={titre:t,rucher:document.getElementById("j-ruch").value,date:document.getElementById("j-date").value,texte:document.getElementById("j-texte").value.trim()};if(id){Object.assign(APP.journal.find(function(x){return x.id===id;}),data);}else{data.id=gId();APP.journal.push(data);}sT();fM();render();}
function suppJournal(id){if(!confirm("Supprimer?"))return;APP.journal=APP.journal.filter(function(x){return x.id!==id;});sT();fM();render();}
// ── FAB & RENDER ──────────────────────────────────────────────
function fabAction(){
  var a={ruches:function(){formRuche(null);},stock:formSI,miel:function(){formStock(null);},reines:function(){formReine(null);},transh:function(){formTransh(null);},compta:formVente,journal:function(){formJournal(null);},carte:function(){formRucher(null);}};
  (a[APP.vue]||demarrerVoix)();
}
function render(){
  var vues={accueil:vueAccueil,ruches:vueRuches,stock:vueStock,carte:vueCarte,alertes:vueAlertes,miel:vueMiellerie,reines:vueReines,transh:vueTranshumance,compta:vueCompta,journal:vueJournal};
  document.getElementById("page").innerHTML=(vues[APP.vue]||vueAccueil)();
  var u=APP.ruches.filter(function(r){return jrs(r.insp)>14||(r.mal&&r.mal!=="Aucune")||r.etat==="Faible";}).length;
  var nav=[{id:"accueil",ic:"&#127968;",lb:"Accueil"},{id:"ruches",ic:"&#128029;",lb:"Ruches"},{id:"stock",ic:"&#128230;",lb:"Stock"},{id:"miel",ic:"&#129572;",lb:"Miel"},{id:"reines",ic:"&#128081;",lb:"Reines"},{id:"transh",ic:"&#128656;",lb:"Transh."},{id:"compta",ic:"&#128176;",lb:"Compta"},{id:"alertes",ic:"&#9888;",lb:u>0?"("+u+")":"Alertes"},{id:"journal",ic:"&#128214;",lb:"Journal"}];
  document.getElementById("nav").innerHTML=nav.map(function(n){return'<button class="ntab'+(APP.vue===n.id?" on":"")+'" onclick="APP.vue=\''+n.id+'\';render()"><span class="nicon">'+n.ic+'</span>'+n.lb+'</button>';}).join("");
  var fabIcons={ruches:"&#128375;",stock:"&#128230;",miel:"&#129572;",reines:"&#128081;",transh:"&#128656;",compta:"&#128176;",journal:"&#128209;",carte:"&#128506;"};
  document.getElementById("fab").innerHTML=fabIcons[APP.vue]||"&#127897;";
}
render();
</script>
